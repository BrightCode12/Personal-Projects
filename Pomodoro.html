<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="Pomodoro.css">
  <!-- <link rel="stylesheet" href="Pomodoro2.css"> -->
</head>

<body>
  <main>
    <div class="progress-rectangle">
      <div class="progress-fill">
        <div class="timer-display">
          <section class="timer" id="timer">
            <p id="currentState"> Focus Mode</p>
            00:00:00
          </section>
        </div>
      </div>
    </div>
    <section class="numberofCounts">
      <p class="rounds"></p>
      <p class="count"></p>
      <p class="dailyCount"></p>
      <p class="timerPop" id="timeUp"></p>
    </section>
    <section class="button-space">
      <button type="submit" class="start" onclick="startTimer() ">Start</button>
      <button type="button" class="pause" onclick="pauseTimer()" id="pause">Pause</button>
      <button type="button" class="reset" onclick="resetTimer()">Reset</button>
      <button type="button" class="stop" id="resetTimer" onclick="stopTimer()">Stop</button>
    </section>

    <section class="userGoal">
      <label for="numOfHours">
        Desired duration
      </label>
      <input type="number" placeholder="Hours" id="numOfHours">
      <label for="numOfminutes">
        Focus length
      </label>
      <input type="number" placeholder="Focus time" id="numOfMinutes" value="25" />
      <label for="numberOfBreaks">
        Break length
      </label>
      <input type="number" placeholder="Break time" id="numberOfBreaks" value="5" />
      <label for="numberOfLongBreak">
        Long break duration.
      </label>
      <input type="number" placeholder="Long Break" id="numberOfLongBreaks" value="10" />
    </section>
  </main>

  <script src="Pomodoro.js"></script>
</body>

</html>
