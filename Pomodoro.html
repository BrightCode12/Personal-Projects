<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="Logo-image2.png" type="image/x-icon" sizes="180x180" class="logo">
  <link rel="shortcut icon" href="Logo-image2.png" type="image/x-icon" sizes="16x16">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="Pomodoro.css">
</head>

<body>
  <main>
    <div class="timer-display">
      <div class="topCon">
        <div class="stateCon">
          <p id="currentState">Focus Mode</p>
        </div>
        <div class="focusCon">
          <p class="focus-text">Focus</p>
          <p class="focus" id="Focus">0</p>
        </div>
      </div>
      <section class="timer" id="timer">
        00:00
      </section>
    </div>
    <section class="numberOfCounts">
      <div class="round-display">
        <p class="round">0</p>
        <div class="text">Rounds</div>
      </div>
      <div class="message">
        <div class="message-text">
          <div class="message-texts">Deep work</div>
          <button class="settings-btn" id="settingBtn">
            ⚙️
          </button>
        </div>
      </div>
    </section>
    <section class="button-space">
      <button type="button" class="start" onclick="timerData.startTimer()">Start</button>
      <button type="button" class="pause" onclick="timerData.pauseTimer()">Pause</button>
      <button type="button" class="reset" onclick="timerData.resetTimer()">Reset</button>
      <button type="button" class="stop" onclick="timerData.stopTimer()">Stop</button>
    </section>

    <section class="pop-Menu" id="popMenu">
      <div class="settings-panel" id="settingsPanel">

        <div class="settings-header">
          <h2>Settings</h2>
        </div>

        <div class="innerInputsContainer">
          <div class="toggle-row">
            <span id="error-menu">Focus Mode</span>
          </div>

          <div class="input-group">

            <div class="input-card">
              <label for="numOfHours">
                Desired duration
              </label>
              <input type="number" placeholder="Hours" id="numOfHours" value="1" min="1" max="10">
            </div>

            <div class="input-card">
              <label for="numOfMinutes">
                Focus length
              </label>
              <input type="number" placeholder="Focus time" id="numOfMinutes" value="25" min="25" max="45" />
            </div>

            <div class="input-card">
              <label for="numberOfBreaks">
                Break length
              </label>
              <input type="number" placeholder="Break time" id="numberOfBreaks" value="5" min="1" max="30" />
            </div>

            <div class="input-card">
              <label for="numberOfLongBreak">
                Long break duration.
              </label>
              <input type="number" placeholder="Long Break" id="numberOfLongBreaks" value="10" min="1" max="60" />
            </div>
          </div>
        </div>
        <button id="close-btn" type="submit">
          Close
        </button>
      </div>
    </section>
  </main>

  <script src="Pomodoro.js"></script>
</body>

</html>
