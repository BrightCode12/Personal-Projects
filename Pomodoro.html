<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="Logo-image2.png" type="image/x-icon" sizes="180x180" class="logo">
  <link rel="shortcut icon" href="Logo-image2.png" type="image/x-icon" sizes="16x16">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="Pomodoro.css">
  <!-- <link rel="stylesheet" href="Pomodoro2.css"> -->
</head>

<body>
  <main>
    <div class="timer-display">
      <section class="timer" id="timer">
        <p id="currentState"> Focus Mode</p>
        00:00:00
      </section>
    </div>
    <section class="numberOfCounts">
      <div class="round-display">
        <p class="round">0</p>
        <div class="text">Rounds</div>
      </div>
      <div class="message">
        <div class="message-text">
          <div class="">Deep work mode </div>
          <button class="settings-btn" id="settingBtn">
            ⚙️
          </button>
        </div>
      </div>
    </section>
    <section class="button-space">
      <button type="submit" class="start" onclick="startTimer() ">Start</button>
      <button type="button" class="pause" onclick="pauseTimer()" id="pause">Pause</button>
      <button type="button" class="reset" onclick="resetTimer()">Reset</button>
      <button type="button" class="stop" id="resetTimer" onclick="stopTimer()">Stop</button>
    </section>

    <section class="pop-Menu" id="popMenu">
      <div class="settings-panel" id="settingsPanel">

        <div class="settings-header">
          <h2>Settings</h2>
        </div>

        <div class="innerInputsContainer">
          <div class="toggle-row">
            <span>Focus Mode</span>
            <label class="switch">
              <input type="checkbox">
              <span class="slider"></span>
            </label>
          </div>

          <div class="input-group">

            <div class="input-card">
              <label for="numOfHours">
                Desired duration
              </label>
              <input type="number" placeholder="Hours" id="numOfHours">
            </div>

            <div class="input-card">
              <label for="numOfMinutes">
                Focus length
              </label>
              <input type="number" placeholder="Focus time" id="numOfMinutes" value="25" />
            </div>

            <div class="input-card">
              <label for="numberOfBreaks">
                Break length
              </label>
              <input type="number" placeholder="Break time" id="numberOfBreaks" value="5" />
            </div>

            <div class="input-card">
              <label for="numberOfLongBreak">
                Long break duration.
              </label>
              <input type="number" placeholder="Long Break" id="numberOfLongBreaks" value="10" />
            </div>
          </div>
        </div>
        <button id="close-btn">
          Close
        </button>
      </div>
    </section>
  </main>

  <script src="Pomodoro.js"></script>
</body>

</html>
